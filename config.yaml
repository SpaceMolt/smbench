server:
  url: http://localhost:8080
  admin_token: benchmark-admin-token
  tick_rate: 2

# Path to commander's entry point (relative to where you run smbench from)
commander_path: ../commander/src/commander.ts

# Path to scenario markdown files
scenarios_dir: scenarios

# All models routed through OpenRouter for uniform billing and cost tracking.
# Set OPENROUTER_API_KEY env var before running.
# Estimated total cost: ~$150-200 for full suite (6 scenarios x 2 runs x 15 models).
models:
  # Frontier (expensive but capable)
  - id: anthropic/claude-sonnet-4-6
    label: "Claude Sonnet 4.6"
    category: frontier
  - id: openai/gpt-5.4
    label: "GPT-5.4"
    category: frontier
  - id: google/gemini-3.1-pro-preview
    label: "Gemini 3.1 Pro"
    category: frontier

  # Frontier-Fast (cheaper, still strong)
  - id: google/gemini-3-flash-preview
    label: "Gemini 3 Flash"
    category: frontier-fast
  - id: openai/gpt-5.3-chat
    label: "GPT-5.3 Chat"
    category: frontier-fast
  - id: mistral/mistral-large-3-2512
    label: "Mistral Large 3"
    category: frontier-fast

  # Mid-Tier (good value)
  - id: deepseek/deepseek-v3.2
    label: "DeepSeek V3.2"
    category: mid-tier
  - id: qwen/qwen3.5-plus
    label: "Qwen 3.5 Plus"
    category: mid-tier
  - id: minimax/minimax-m2.5
    label: "MiniMax M2.5"
    category: mid-tier
  - id: bytedance/seed-2.0-lite
    label: "Seed 2.0 Lite"
    category: mid-tier

  # Budget (cheap/free, test floor performance)
  - id: qwen/qwen3.5-9b
    label: "Qwen 3.5 9B"
    category: budget
  - id: qwen/qwen3.5-flash
    label: "Qwen 3.5 Flash"
    category: budget
  - id: mistral/ministral-3-14b
    label: "Ministral 3 14B"
    category: budget
  - id: google/gemini-3.1-flash-lite-preview
    label: "Gemini 3.1 Flash Lite"
    category: budget
  - id: bytedance/seed-1.6-flash
    label: "Seed 1.6 Flash"
    category: budget

scenarios:
  - s1-bootstrap-grind
  - s2-navigation
  - s3-trading
  - s5-combat
  - s6-mission-runner

runs_per_scenario: 2

judge_model: google/gemini-3-flash-preview
